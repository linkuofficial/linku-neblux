app = 'nexus-linku'
primary_region = 'nrt'

[build]

[env]
  APP_ENV = 'production'
  HOST = '0.0.0.0'
  PORT = '8000'
  DEBUG = 'false'
  CORS_ORIGINS = 'https://nexus.linku.tech,https://nexus-linku.fly.dev'
  ADMIN_ALLOWED_IPS = ''
  ADMIN_TRUST_FORWARDED_FOR = 'true'
  ADMIN_TRUSTED_PROXIES = ''
  ADMIN_ENABLE_GENERATION_IN_PRODUCTION = 'false'
  NEO4J_URI = 'bolt://localhost:7687'
  NEO4J_USER = 'neo4j'
  ADMIN_MAX_TASKS = '200'
  ADMIN_TASK_TTL_SECONDS = '86400'
  ADMIN_TRIGGER_WINDOW_SECONDS = '60'
  ADMIN_TRIGGER_MAX_REQUESTS = '8'
  ADMIN_ALERT_PER_MINUTE = '12'
  ADMIN_ALERT_PER_DAY = '200'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
