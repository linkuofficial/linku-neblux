<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script src="/lang-init.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e27">
    <meta name="color-scheme" content="dark">
    <title>Wonders — Neblux</title>
    <meta name="description"
        content="Curated tours through the knowledge graph — follow one idea step by step and fall for the joy of understanding.">
    <link rel="canonical" href="https://neblux.linku.tech/wonders.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Neblux">
    <meta property="og:url" content="https://neblux.linku.tech/wonders.html">
    <meta property="og:title" content="Wonders — Neblux">
    <meta property="og:description"
        content="Curated tours through the knowledge graph — follow one idea and fall for the joy of understanding.">
    <meta property="og:image" content="https://neblux.linku.tech/og-image.png">
    <meta property="og:locale" content="en_US">
    <meta property="og:locale:alternate" content="zh_TW">
    <meta property="og:locale:alternate" content="ja_JP">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/neblux-fonts.css">
    <link rel="stylesheet" href="/neblux-theme.css">
    <link rel="stylesheet" href="src/shared.css">
    <link rel="stylesheet" href="src/styles/pages/wonders.css">
</head>

<body>
    <div id="hdr">
        <h1 id="hdr-title">Neblux Wonders</h1>
        <div id="hdr-nav">
            <a id="hdr-home-link" href="index.html">Home</a>
            <span class="hdr-nav-sep" aria-hidden="true">/</span>
            <a id="hdr-tours-link" href="wonders.html">Tours</a>
            <span class="hdr-nav-sep" aria-hidden="true">/</span>
            <a id="hdr-graph-link" href="app.html">Graph</a>
        </div>
    </div>

    <div id="lang-toggle" aria-label="Language selector">
        <button class="lang-btn" data-lang="en" type="button" aria-label="Switch language to English">EN</button>
        <button class="lang-btn" data-lang="zh" type="button" aria-label="Switch language to Chinese">中</button>
        <button class="lang-btn" data-lang="ja" type="button" aria-label="Switch language to Japanese">日</button>
    </div>

    <canvas id="canvas" style="position:fixed;inset:0;width:100%;height:100%" aria-hidden="true"></canvas>

    <div id="loading" role="status" aria-live="polite">
        <span id="loading-text">Loading…</span>
        <button id="loading-retry" type="button" style="display:none">Retry</button>
    </div>

    <!-- Narrative panel: the curiosity loop walks through here -->
    <aside id="wonder-panel" hidden tabindex="-1" aria-label="Guided tour">
        <header id="wp-head">
            <div id="wp-kicker"></div>
            <h2 id="wp-title"></h2>
            <div id="wp-progress" role="group" aria-label="Tour progress"></div>
        </header>

        <p id="wp-live" class="vh" role="status" aria-live="polite"></p>

        <div id="wp-body" aria-live="polite">
            <div class="wp-block wp-hook"><span class="wp-tag" data-tag="hook"></span>
                <p id="wp-hook"></p>
            </div>
            <div class="wp-block wp-reveal">
                <p id="wp-reveal"></p>
            </div>
            <div class="wp-block wp-example"><span class="wp-tag" data-tag="example"></span>
                <p id="wp-example"></p>
            </div>
            <div class="wp-block wp-surprise"><span class="wp-tag" data-tag="surprise"></span>
                <p id="wp-surprise"></p>
            </div>
        </div>

        <footer id="wp-foot">
            <a id="wp-thread" href="#" role="button"></a>
            <div id="wp-outward" hidden></div>
            <div id="wp-recs" hidden></div>
            <div id="wp-nav">
                <button id="wp-prev" type="button">←</button>
                <span id="wp-count"></span>
                <button id="wp-next" type="button">→</button>
            </div>
            <a id="wp-sky" hidden></a>
            <button id="wp-alt" type="button" hidden></button>
        </footer>
    </aside>

    <!-- First-run hint that the starfield is interactive -->
    <div id="wonder-hint" hidden></div>

    <!-- Intro card shown before the tour starts -->
    <div id="wonder-intro" hidden>
        <div id="wi-card">
            <div id="wi-kicker"></div>
            <h2 id="wi-title"></h2>
            <p id="wi-text"></p>
            <button id="wi-start" type="button"></button>
        </div>
    </div>

    <!-- Picker: choose a wonder when no ?w= is given -->
    <div id="wonder-picker" hidden>
        <div id="wpk-head">
            <div id="wpk-kicker"></div>
            <h2 id="wpk-title"></h2>
            <p id="wpk-subtitle"></p>
        </div>
        <div id="wpk-grid"></div>
    </div>

    <script src="/neblux-tokens.js"></script>
    <script type="module" src="/src/wonders-main.js"></script>
</body>

</html>
