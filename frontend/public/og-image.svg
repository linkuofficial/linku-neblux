<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <radialGradient id="glow" cx="76%" cy="30%" r="60%">
      <stop offset="0" stop-color="#5b9bd5" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#9b7bc9" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#05070d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- distant dust stars -->
  <g fill="#ffffff">
    <circle cx="70" cy="80" r="1.3" opacity="0.40"/>
    <circle cx="150" cy="540" r="1.1" opacity="0.30"/>
    <circle cx="240" cy="120" r="1.6" opacity="0.50"/>
    <circle cx="320" cy="470" r="1.2" opacity="0.35"/>
    <circle cx="430" cy="60" r="1.0" opacity="0.30"/>
    <circle cx="520" cy="560" r="1.5" opacity="0.45"/>
    <circle cx="660" cy="110" r="1.2" opacity="0.35"/>
    <circle cx="700" cy="500" r="1.6" opacity="0.50"/>
    <circle cx="780" cy="70" r="1.1" opacity="0.30"/>
    <circle cx="860" cy="540" r="1.3" opacity="0.40"/>
    <circle cx="960" cy="120" r="1.5" opacity="0.45"/>
    <circle cx="1010" cy="470" r="1.1" opacity="0.30"/>
    <circle cx="1080" cy="80" r="1.4" opacity="0.40"/>
    <circle cx="1130" cy="560" r="1.2" opacity="0.35"/>
    <circle cx="1150" cy="300" r="1.3" opacity="0.40"/>
    <circle cx="40" cy="320" r="1.2" opacity="0.35"/>
  </g>

  <!-- a small constellation on the right: connections between bright nodes -->
  <g stroke="#c4c6ce" stroke-width="1.4" opacity="0.22" fill="none">
    <line x1="900" y1="180" x2="1010" y2="250"/>
    <line x1="1010" y1="250" x2="965" y2="370"/>
    <line x1="965" y1="370" x2="850" y2="410"/>
    <line x1="900" y1="180" x2="850" y2="410"/>
    <line x1="1010" y1="250" x2="1095" y2="170"/>
    <line x1="965" y1="370" x2="1080" y2="440"/>
  </g>
  <g>
    <circle cx="900" cy="180" r="9" fill="#5b9bd5" opacity="0.95"/>
    <circle cx="1010" cy="250" r="13" fill="#f0c050" opacity="0.95"/>
    <circle cx="965" cy="370" r="8" fill="#5bc97a" opacity="0.95"/>
    <circle cx="850" cy="410" r="7" fill="#c95b9b" opacity="0.9"/>
    <circle cx="1095" cy="170" r="6" fill="#9b7bc9" opacity="0.9"/>
    <circle cx="1080" cy="440" r="6" fill="#c97a5b" opacity="0.9"/>
  </g>

  <!-- wordmark + message -->
  <text x="96" y="250" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="30" letter-spacing="9" fill="#f0c050" fill-opacity="0.85">DEEP FIELD SURVEY</text>
  <text x="92" y="372" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-weight="bold" font-size="132" letter-spacing="2" fill="#f4f7ff">NEBLUX</text>
  <text x="96" y="452" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="44" fill="#d4e4fa">Everything touches everything.</text>
  <text x="96" y="506" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="27" fill="#8aa0c0">A connected map of human knowledge.</text>
</svg>
